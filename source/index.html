    <script>
    // Home feed: load Article / Agent / Musings updates sorted by date
    (function() {
        const ICONS = { article: 'fa-solid fa-book', agent: 'fa-solid fa-robot', musings: 'fa-solid fa-feather' };
        const LABELS = { article: 'Article', agent: 'Agent', musings: 'Musings' };
        const container = document.getElementById('home-posts-dynamic');
        if (!container) return;

        async function loadFeed() {
            try {
                const [articles, hexoArticles, agents, musings] = await Promise.all([
                    SiteAPI.fetchIssues('article'),
                    fetchHexoArticles(),
                    SiteAPI.fetchIssues('agent'),
                    SiteAPI.fetchIssues('musings')
                ]);
                const all = [];
                articles.filter(function(i) { return !isLocallyDeletedIssue('article', i); }).forEach(function(i) { i._label = 'article'; all.push(i); });
                hexoArticles.forEach(function(i) { i._label = 'article'; all.push(i); });
                agents.filter(function(i) { return !isLocallyDeletedIssue('agent', i); }).forEach(function(i) { i._label = 'agent'; all.push(i); });
                musings.filter(function(i) { return !isLocallyDeletedIssue('musings', i); }).forEach(function(i) { i._label = 'musings'; all.push(i); });

                all.sort(function(a, b) { return new Date(b.created_at) - new Date(a.created_at); });

                if (all.length === 0) {
                    container.innerHTML = '<div class="post"><h2 class="post-title">暂无内容</h2><div class="description"><p>敬请期待...</p></div></div>';
                    return;
                }

                container.innerHTML = '';
                all.forEach(function(issue) {
                    var data;
                    try { data = JSON.parse(issue.body); } catch(e) { data = { content: issue.body }; }
                    var label = issue._label;
                    var icon = ICONS[label] || 'fa-solid fa-file';
                    var catName = LABELS[label] || label;
                    var date = data.date || formatDate(issue.created_at);

                    var div = document.createElement('div');
                    div.className = 'post';
                    var html = '<h2 class="post-title">' + escapeHtml(data.title || issue.title) + '</h2>';
                    html += '<div class="category-and-date"><span class="category"><i class="' + icon + ' fa-fw"></i> ' + catName + '</span>';
                    html += '<span class="date"><i class="fa-solid fa-calendar fa-fw"></i> ' + escapeHtml(date) + '</span></div>';
                    if (data.content) html += '<div class="description"><p>' + escapeHtml(data.content) + '</p></div>';
                    if (data.tags) {
                        html += '<div class="post-tags">';
                        data.tags.split(',').forEach(function(t) { if (t.trim()) html += '<span class="tag"><a href="#">#' + escapeHtml(t.trim()) + '</a></span>'; });
                        html += '</div>';
                    }
                    if (data.link) html += '<a class="go-post" href="' + escapeHtml(data.link) + '" target="_blank">进入 →</a>';
                    div.innerHTML = html;
                    container.appendChild(div);
                });
            } catch(e) {
                container.innerHTML = '<div class="post"><h2 class="post-title">加载失败</h2><div class="description"><p>请刷新重试</p></div></div>';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            var d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function formatDate(isoStr) {
            var d = new Date(isoStr);
            var pad = function(n){return String(n).padStart(2,'0');};
            return d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
        }

        async function fetchHexoArticles() {
            try {
                var res = await fetch('/article-data.json?_=' + Date.now(), { cache: 'no-store' });
                if (!res.ok) return [];
                var posts = await res.json();
                return posts.filter(function(post) {
                    return !isLocallyDeletedArticle(post);
                }).map(function(post) {
                    return {
                        title: post.title,
                        created_at: post.date || new Date().toISOString(),
                        body: JSON.stringify(post),
                        _hexo: true
                    };
                });
            } catch(e) {
                return [];
            }
        }

        function isLocallyDeletedArticle(post) {
            var deleted = JSON.parse(localStorage.getItem('david_deleted_articles') || '[]');
            return deleted.indexOf(post.postPath || '') >= 0 ||
                deleted.indexOf(post.sourceFile || '') >= 0 ||
                deleted.indexOf(post.link || '') >= 0;
        }

        function isLocallyDeletedIssue(label, issue) {
            var deleted = JSON.parse(localStorage.getItem('david_deleted_issues') || '[]');
            return deleted.indexOf(String(label || '') + ':' + String(issue.number || '')) >= 0;
        }

        loadFeed();
    })();
    </script>
