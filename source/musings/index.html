    <canvas id="stars-canvas"></canvas>

    <div class="page-container">
        <div class="page-card">
            <div class="page-header">
                <h1><i class="fa-solid fa-feather"></i> Musings</h1>
                <p class="page-desc">碎碎念与随想</p>
            </div>
            <div class="posts-grid" id="posts-grid">
                <div class="loading-hint">加载中...</div>
            </div>
        </div>

        <div class="admin-panel" id="admin-panel">
            <button class="admin-toggle-btn" id="admin-toggle"><i class="fa-solid fa-lock"></i> 管理员</button>
            <div class="admin-login" id="admin-login" style="display:none;">
                <input type="password" id="admin-pwd" placeholder="输入管理员密码">
                <button class="admin-login-btn" id="admin-login-btn">验证</button>
            </div>
            <div class="admin-form" id="admin-form" style="display:none;">
                <h3><i class="fa-solid fa-feather"></i> 发布碎碎念</h3>
                <input type="text" id="post-title" placeholder="标题">
                <textarea id="post-desc" placeholder="正文内容"></textarea>
                <div class="media-upload-block">
                    <label class="admin-field-label">上传图片/视频（可选）</label>
                    <div class="file-picker">
                        <input type="file" id="post-media-file" accept="image/*,video/*">
                        <label for="post-media-file" class="file-picker-btn"><i class="fa-solid fa-file-arrow-up"></i> 选择文件</label>
                        <span id="post-media-file-name" class="file-picker-name">未选择文件</span>
                    </div>
                </div>
                <button class="admin-push-btn" id="admin-push">Push 发布</button>
            </div>
